# Production Compose.
# Запуск: docker compose --env-file .env.prod -f docker-compose.prod.yaml up -d
# Секреты: .env.prod на сервере (не коммитить в git).
# Production deploy must set immutable image tags:
#   API_IMAGE=ghcr.io/<owner>/repricerx/api:<git-sha>
#   WORKER_IMAGE=ghcr.io/<owner>/repricerx/worker:<git-sha>
#   WEB_IMAGE=ghcr.io/<owner>/repricerx/web:<git-sha>

services:
  db:
    image: postgres:16-alpine
    container_name: repricer_db
    environment:
      POSTGRES_USER: repricer
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: repricer_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repricer -d repricer_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: repricer_redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: ${API_IMAGE:?API_IMAGE must be set to an immutable image tag}
    container_name: repricer_api
    environment:
      DATABASE_URL: postgres://repricer:${DB_PASSWORD}@db:5432/repricer_db?sslmode=disable
      REDIS_ADDR: redis:6379
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      ENVIRONMENT: prod
      PORT: "8080"
      ALLOWED_ORIGINS: https://${DOMAIN}
      TRUST_PROXY_HEADERS: "true"
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      MAILER_MODE: ${MAILER_MODE:-smtp}
      SMTP_HOST: ${SMTP_HOST:-smtp.yandex.ru}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      VERIFICATION_URL_BASE: https://${DOMAIN}/verify
      PASSWORD_RESET_URL_BASE: https://${DOMAIN}/reset-password
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      credbackfill:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ${API_IMAGE:?API_IMAGE must be set to an immutable image tag}
    container_name: repricer_migrate
    entrypoint: ["/app/migrate"]
    environment:
      DATABASE_URL: postgres://repricer:${DB_PASSWORD}@db:5432/repricer_db?sslmode=disable
      APP_SECRET_KEY: ${APP_SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  credbackfill:
    image: ${API_IMAGE:?API_IMAGE must be set to an immutable image tag}
    container_name: repricer_credbackfill
    entrypoint: ["/app/credbackfill"]
    environment:
      DATABASE_URL: postgres://repricer:${DB_PASSWORD}@db:5432/repricer_db?sslmode=disable
      APP_SECRET_KEY: ${APP_SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"
    networks:
      - internal

  worker:
    image: ${WORKER_IMAGE:?WORKER_IMAGE must be set to an immutable image tag}
    container_name: repricer_worker
    environment:
      DATABASE_URL: postgres://repricer:${DB_PASSWORD}@db:5432/repricer_db?sslmode=disable
      REDIS_ADDR: redis:6379
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      ENVIRONMENT: prod
      MAILER_MODE: ${MAILER_MODE:-smtp}
      SMTP_HOST: ${SMTP_HOST:-smtp.yandex.ru}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      VERIFICATION_URL_BASE: https://${DOMAIN}/verify
      PASSWORD_RESET_URL_BASE: https://${DOMAIN}/reset-password
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-2s}
      WORKER_LOCK_TTL: ${WORKER_LOCK_TTL:-5m}
      WORKER_JOB_TIMEOUT: ${WORKER_JOB_TIMEOUT:-2m}
      WORKER_MAX_ATTEMPTS: ${WORKER_MAX_ATTEMPTS:-5}
      WORKER_SHUTDOWN_TIMEOUT: ${WORKER_SHUTDOWN_TIMEOUT:-30s}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      credbackfill:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - internal

  scheduler:
    image: ${SCHEDULER_IMAGE:?SCHEDULER_IMAGE must be set to an immutable image tag}
    container_name: repricer_scheduler
    environment:
      DATABASE_URL: postgres://repricer:${DB_PASSWORD}@db:5432/repricer_db?sslmode=disable
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      ENVIRONMENT: prod
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - internal

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE must be set to an immutable image tag}
    container_name: repricer_web
    volumes:
      - web_dist:/dist
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: repricer_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
      - web_dist:/usr/share/nginx/html:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - internal

volumes:
  pg_data:
  redis_data:
  web_dist:

networks:
  internal:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
        - subnet: fd12:3456:789a::/64
