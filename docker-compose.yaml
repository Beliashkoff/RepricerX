version: '3.8'

services:
  postgres:
    image: postgres:16-apline
    container_name: repricer_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data 
    restart: always
    networks:
      - repricer-net

  redis:
    image: redis:7-alpine
    container_name: repricer_redis
    ports: 
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - repricer-net

volumes:
  pg_data:
  redis_data:

networks:
  repricer-net:
    driver: bridge