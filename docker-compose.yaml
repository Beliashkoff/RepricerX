services:
  db:
    image: postgres:16-alpine
    container_name: repricer_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: repricer_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - repricer-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d repricer_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: repricer_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - repricer-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: repricer_api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://admin:secret@db:5432/repricer_db?sslmode=disable
      REDIS_ADDR: redis:6379
      APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-only-change-me-32-bytes-minimum}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      PORT: "8080"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
      MAILER_MODE: ${MAILER_MODE:-log}
      VERIFICATION_URL_BASE: ${VERIFICATION_URL_BASE:-http://localhost:5173/verify}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - repricer-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  redis_data:

networks:
  repricer-net:
    driver: bridge
