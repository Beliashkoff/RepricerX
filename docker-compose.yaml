services:
  db:
    image: postgres:16-alpine
    container_name: repricer_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: repricer_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - repricer-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d repricer_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: repricer_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - repricer-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: repricer_api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://admin:secret@db:5432/repricer_db?sslmode=disable
      REDIS_ADDR: redis:6379
      APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-only-change-me-32-bytes-minimum}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      PORT: "8080"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
      MAILER_MODE: ${MAILER_MODE:-log}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_START_URL: ${TELEGRAM_BOT_START_URL:-}
      VERIFICATION_URL_BASE: ${VERIFICATION_URL_BASE:-http://localhost:5173/verify}
      PASSWORD_RESET_URL_BASE: ${PASSWORD_RESET_URL_BASE:-http://localhost:5173/reset-password}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - repricer-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: repricer_worker
    environment:
      DATABASE_URL: postgres://admin:secret@db:5432/repricer_db?sslmode=disable
      REDIS_ADDR: redis:6379
      APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-only-change-me-32-bytes-minimum}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-2s}
      WORKER_LOCK_TTL: ${WORKER_LOCK_TTL:-5m}
      WORKER_JOB_TIMEOUT: ${WORKER_JOB_TIMEOUT:-2m}
      WORKER_MAX_ATTEMPTS: ${WORKER_MAX_ATTEMPTS:-5}
      WORKER_SHUTDOWN_TIMEOUT: ${WORKER_SHUTDOWN_TIMEOUT:-30s}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      VERIFICATION_URL_BASE: ${VERIFICATION_URL_BASE:-http://localhost:5173/verify}
      PASSWORD_RESET_URL_BASE: ${PASSWORD_RESET_URL_BASE:-http://localhost:5173/reset-password}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - repricer-net

  bot:
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
    container_name: repricer_bot
    environment:
      DATABASE_URL: postgres://admin:secret@db:5432/repricer_db?sslmode=disable
      REDIS_ADDR: redis:6379
      APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-only-change-me-32-bytes-minimum}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - repricer-net

  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler.Dockerfile
    container_name: repricer_scheduler
    environment:
      DATABASE_URL: postgres://admin:secret@db:5432/repricer_db?sslmode=disable
      REDIS_ADDR: redis:6379
      APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-only-change-me-32-bytes-minimum}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - repricer-net

  web:
    image: node:22-alpine
    container_name: repricer_web
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_DEV_PROXY_TARGET: http://api:8080
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - repricer-net

volumes:
  pg_data:
  redis_data:
  web_node_modules:

networks:
  repricer-net:
    driver: bridge
