name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: repricer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d repricer_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgres://test:test@localhost:5432/repricer_test?sslmode=disable
      REDIS_ADDR: localhost:6379
      APP_SECRET_KEY: ci-test-secret-key-minimum-32-bytes!!
      ENVIRONMENT: dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -race -cover ./...

      - name: Run integration tests
        run: go test -tags=integration -race ./tests/integration/...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  images:
    name: Build immutable images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        shell: bash
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          image_ns="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/repricerx"

          docker buildx build --push \
            -f docker/api.Dockerfile \
            -t "${image_ns}/api:${GITHUB_SHA}" \
            -t "${image_ns}/api:main" \
            .

          docker buildx build --push \
            -f docker/worker.Dockerfile \
            -t "${image_ns}/worker:${GITHUB_SHA}" \
            -t "${image_ns}/worker:main" \
            .

          docker buildx build --push \
            -f docker/web.Dockerfile \
            --build-arg VITE_CLERK_PUBLISHABLE_KEY="${VITE_CLERK_PUBLISHABLE_KEY}" \
            -t "${image_ns}/web:${GITHUB_SHA}" \
            -t "${image_ns}/web:main" \
            .
