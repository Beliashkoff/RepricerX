name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Immutable image tag to deploy, usually a main-branch commit SHA"
        required: true

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    env:
      IMAGE_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.image_sha || github.event.workflow_run.head_sha }}

    steps:
      - name: Resolve image names
        id: images
        shell: bash
        run: |
          set -euo pipefail
          image_ns="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/repricerx"
          {
            echo "API_IMAGE=${image_ns}/api:${IMAGE_SHA}"
            echo "WORKER_IMAGE=${image_ns}/worker:${IMAGE_SHA}"
            echo "WEB_IMAGE=${image_ns}/web:${IMAGE_SHA}"
          } >> "$GITHUB_ENV"
          {
            echo "api_image=${image_ns}/api:${IMAGE_SHA}"
            echo "worker_image=${image_ns}/worker:${IMAGE_SHA}"
            echo "web_image=${image_ns}/web:${IMAGE_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_SHA: ${{ env.IMAGE_SHA }}
          API_IMAGE: ${{ steps.images.outputs.api_image }}
          WORKER_IMAGE: ${{ steps.images.outputs.worker_image }}
          WEB_IMAGE: ${{ steps.images.outputs.web_image }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: IMAGE_SHA,API_IMAGE,WORKER_IMAGE,WEB_IMAGE,GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            cd /home/repricer/RepricerX

            echo "==> sync deployment manifests"
            git fetch --depth 1 origin "${IMAGE_SHA}"
            git checkout --force "${IMAGE_SHA}"

            mkdir -p .deploy
            if [ -f .deploy/current.env ]; then
              cp .deploy/current.env .deploy/previous.env
            fi

            export API_IMAGE WORKER_IMAGE WEB_IMAGE

            echo "==> login to GHCR"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            echo "==> pull immutable images"
            docker compose --env-file .env.prod -f docker-compose.prod.yaml pull api worker web

            docker logout ghcr.io

            echo "==> run migrations"
            docker compose --env-file .env.prod -f docker-compose.prod.yaml rm -f migrate || true
            docker compose --env-file .env.prod -f docker-compose.prod.yaml up --no-build --no-deps --exit-code-from migrate migrate

            echo "==> encrypt legacy shop credentials"
            docker compose --env-file .env.prod -f docker-compose.prod.yaml rm -f credbackfill || true
            docker compose --env-file .env.prod -f docker-compose.prod.yaml up --no-build --no-deps --exit-code-from credbackfill credbackfill

            echo "==> start application"
            docker compose --env-file .env.prod -f docker-compose.prod.yaml up -d --no-build api worker web nginx

            echo "==> waiting for API health..."
            timeout 60 bash -c 'until docker exec repricer_api wget -qO- http://localhost:8080/healthz > /dev/null 2>&1; do sleep 2; done'

            cat > .deploy/current.env <<EOF
            IMAGE_SHA=${IMAGE_SHA}
            API_IMAGE=${API_IMAGE}
            WORKER_IMAGE=${WORKER_IMAGE}
            WEB_IMAGE=${WEB_IMAGE}
            EOF

            echo "==> prune old images"
            docker image prune -f

            echo "==> deploy complete"
